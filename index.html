<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Favoriten</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container" class="stack-container"></div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Vollbild">
    </div>

    <div id="admin-menu">
        <h3>Neuer Eintrag</h3>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="link" placeholder="Link">
        <input type="text" id="img" placeholder="Bild-URL">
        <button onclick="addEntry()">Speichern</button>
        <button onclick="toggleMenu()">Abbrechen</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
