<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Favoriten</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    
    <!-- Dieses eingebaute CSS zwingt GitHub Pages, das Design SOFORT zu laden -->
    <style>
        .search-section {
            margin: 30px auto 40px auto; /* 40px Abstand nach unten zu den Karten */
            text-align: center;
            max-width: 400px;
            padding: 0 15px;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px; /* Schön abgerundet */
            border: 1px solid #333; /* Gleicher Rand wie die Karten */
            background: rgba(30, 30, 30, 0.9); /* EXAKT die gleiche Farbe wie deine Karten! */
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        #searchInput:focus {
            border-color: #bb86fc; /* Leuchtet lila, wenn man reinklickt */
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
        }

        .history-container {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .history-tag {
            background: rgba(45, 45, 45, 0.9);
            color: #bb86fc;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #444;
            transition: all 0.2s ease;
        }

        .history-tag:hover {
            background: #bb86fc;
            color: black;
        }
    </style>
</head>
<body>

    <!-- Suchbereich -->
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Model suchen...">
        <div id="searchHistory" class="history-container"></div>
    </div>

    <!-- Karten-Grid -->
    <div id="container" class="grid"></div>

</body>
</html>
