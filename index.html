<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Favoriten</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="header-bar">
        <div class="menu-btn" id="menuToggle">
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <p style="color: #666; font-size: 14px; padding: 20px;">(Hier ist Platz für zukünftige Links...)</p>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Model suchen...">
        <div id="searchHistory" class="history-container"></div>
    </div>

    <div id="container" class="grid"></div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        if (menuToggle && sidebar && overlay) {
            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        }
    </script>

</body>
</html>
