name: Update Favorites Data

on:
  repository_dispatch:
    types: [update_link]

permissions:
  contents: write
  pull_requests: write

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update script.js Content
        run: |
          # Hier wird das Skript durch die Daten der KI aktualisiert
          echo '${{ github.event.client_payload.code }}' > script.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "KI-Update: Eintrag hinzugefügt"
          title: "🤖 KI-Vorschlag: Neuen Eintrag hinzufügen"
          body: "Ich habe den gewünschten Eintrag im Code ergänzt. Bitte überprüfe die Änderung und bestätige sie."
          branch: "ki-update-daten"
          base: "main"
